<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="contact.png" type="image/x-icon" size=1*6> 
    <title>Contact Me</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            padding:0;
            margin:0;
            background-color:rgba(255, 0, 255, 0.815);
        }
        .upper{
            width:50%;
            height: 300px;
            background:url('adam-solomon-WHUDOzd5IYU-unsplash.jpg') no-repeat center;
            background-size: cover;
            float: right;
        }
        .mid{
            position: absolute;
            top:280px;
            width:52%;
            min-width: 340px;
            height:300px;
            background-color: #fff;
            z-index:-1;
            font-size:1.5rem;
        }
        .mid p{
            font-family: Arial, Helvetica, sans-serif;
            margin:2rem 2rem 3rem 2rem;
            text-align: justify;
        }
        .mid a{
          font-family:cursive;
          font-weight:900;
          text-decoration: none;
          color:#fff;
          background: rgba(255, 0, 255, 0.911);
          padding:0.5em 1em;
          border-radius: 5em;
          text-align:center;
          display: block;
          width:45%;
          margin:1rem auto;
          position:relative;
          overflow:hidden;
          z-index:3;
          border:3px solid transparent;
          transition: 0.3s;

        }
        .mid a:hover,
        .mid a:focus{
            border: 3px solid #000;
            color:black;
            transform: translate(3px,3px);
        }
         /* .mid a::before{
            content:"";
            text-align: center;
            position:absolute;
            background: rgba(209, 24, 226, 0.375);
            border-radius: 5em;
            top:0;
            left:-100%;
            right:100%;
            bottom:0;
            z-index:2;
            transition:left 0.6s linear,right 0.6s linear;
        } */
        /* .mid a:hover::before{
            left:0;
            right:10%;
        } */
        
        /* media query */
        @media(max-width:480px){
            body{
                background:white;
            }
            .upper{
                width:100%;
            }
            .mid{
                width:100%;
                height:auto;
                font-size:1rem;
                margin-top:1rem;
                text-align: justify;
            }
        }
        @media(max-width:768px){
           .mid{
               font-size:1rem;
              height: auto;
           }
           .mid p{
               line-height: 1.3rem;
               margin-bottom:1.2rem;
           }
        }
        @media(max-width:1089px){
            .mid{
             font-size:1.3rem;
            }
            .mid p{
                line-height: 1.5rem;
                margin:2rem;
            }
        }
    </style>
</head>
<body>
    <div class="upper"></div>
    <div class="mid">
        <p>If you have any questions or want to hire me, please feel free to drop me a line.
             If you don't get an answer immediately, I might just be travelling through the middle of nowhere.
              I'll get back to you as soon as I can. That's a promise!</p>
        <a href="mailto:tech.sagarsh@gmail.com">Mail Me !</a></div>
</body>
</html>
